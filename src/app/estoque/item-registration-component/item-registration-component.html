<div class="card shadow-sm">
  <div class="card-header bg-light">
    <h2 class="h5 mb-0 py-1 text-secondary">Cadastrar Novo Item</h2>
  </div>
  
  <div class="card-body">
    <div class="mb-3">
      <label for="nomeItem" class="form-label fw-semibold">Nome do Item:</label>
      <input type="text" id="nomeItem" class="form-control" [(ngModel)]="nomeItem" placeholder="Ex: Dorflex MAX 500mg">
    </div>
    
    <div class="mb-3">
      <label for="qtdItem" class="form-label fw-semibold">Quantidade:</label>
      <input type="number" id="qtdItem" class="form-control" [(ngModel)]="quantidadeInicial" min="0">
    </div>
    
    <button (click)="cadastrar()" class="btn btn-primary w-100 fw-bold">Cadastrar</button>
  </div>
</div>
